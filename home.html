<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Home</title>
  <link rel="shortcut icon" href="./assets/github-logo.png" type="image/x-icon">

  <link rel="stylesheet" href="./style.css">

  <!-- daisyUI and tailwindcss  -->
   <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css" />
<script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>

<!-- font awesome -->
 <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css" integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw==" crossorigin="anonymous" referrerpolicy="no-referrer" />
</head>
<body class="bg-base-200">


 <header>
  <div class="navbar bg-base-100 shadow-sm">
  <div class="flex-1">
    <a class="btn btn-ghost text-xl">
      <div class="w-10"><img src="./assets/github-logo.png" alt=""></div>
      <h1>GitHub Issues Tracker</h1>
    </a>
  </div>
  <div class="flex gap-2">
    <input type="text" placeholder="Search" class="input input-bordered w-24 md:w-auto" />
    <div class="dropdown dropdown-end">
        <div>
          <button class="btn btn-primary"><span><i class="fa-solid fa-plus"></i></span> New Issue</button>
        </div>
      <ul
        tabindex="-1"
        class="menu menu-sm dropdown-content bg-base-100 rounded-box z-1 mt-3 w-52 p-2 shadow">
        <li>
          <a class="justify-between">
            Profile
            <span class="badge">New</span>
          </a>
        </li>
        <li><a>Settings</a></li>
        <li><a>Logout</a></li>
      </ul>
    </div>
  </div>
</div>
 </header>


 <section class="w-11/12 mx-auto shadow-md rounded-sm mt-10">

  <div class="p-5">
  <button id="all-btn" class="btn active">All</button>

  <button id="open-btn" class="btn">Open</button>

  <button id="closed-btn" class="btn">Closed</button>
  </div>

 </section>

 <main class="w-11/12 mx-auto mt-5 pb-20">
  <div class="flex justify-between p-5 shadow-md ">
    <div class="left-section flex">
      <div class=" mt-3"><img src="./assets/Aperture.png" alt=""></div>
      <div class="pl-3">
        <h1 class="text-xl font-bold"><span id="total-issues">0</span><span> Issues</span></h1>
        <p>Track and manage your project issues</p>
      </div>
    </div>

    <div class="right-section flex gap-2">
      <h1><span class="text-green-600"><i class="fa-solid fa-circle"></i></span>Open</h1>
      <h1><span class="text-purple-600"><i class="fa-solid fa-circle"></i></span>Closed</h1>
    </div>
  </div>

  <!-- card container  -->

  <div  class=" bg-base-300 ">
   <!-- loading  -->
  <section id="loading" class="flex justify-center items-center py-10 ">
     <span class="loading loading-infinity loading-xl"></span>

  </section>
 <div id="card-container" class="grid grid-cols-4 gap-5 p-5">

 </div>
