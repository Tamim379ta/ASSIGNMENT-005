<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login</title>

  <!-- daisy ui and tailwind  -->
   <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css" />
<script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>

<!-- font awesome  -->
 <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css" integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw==" crossorigin="anonymous" referrerpolicy="no-referrer" />

<link rel="stylesheet" href="./style.ss">
</head>
<body>

  <section>
    <div class="flex justify-center mt-20">
    <fieldset class="fieldset bg-base-200 border-base-300 rounded-box w-xs border p-4">
      <img src="./assets/github-logo.png" alt="" class="mx-auto">
      <h1 class="text-2xl text-center font-bold">GitHub Issues Tracker</h1>
      <p class="font-semibold text-center" >Sign in to manage your issues</p>

    <label class=" font-semibold">Username</label>
    <input id="username" type="text" class="input" placeholder="Enter Username" />
    <p class="text-sky-400">Default: admin</p>

    <label class="font-semibold">Password</label>
    <input id="password" type="password" class="input" placeholder="Enter Password" />
    <p class="text-sky-400">Default: admin123</p>

    <button onclick="homepage()" class="btn btn-primary mt-4">Sing In</button>
    </fieldset>
    </div>
  </section>
  

  <script src="./login.js"></script>
</body>
</html>
